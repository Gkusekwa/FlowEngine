services:
  postgres:
    image: postgres:18-alpine
    container_name: flowengine-postgres
    environment:
      POSTGRES_DB: flowengine
      POSTGRES_USER: flowengine
      POSTGRES_PASSWORD: flowengine_secret
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U flowengine']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: flowengine-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: flowengine-api
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: development
      API_PORT: 3001
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: flowengine
      DATABASE_USER: flowengine
      DATABASE_PASSWORD: flowengine_secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: dev-secret-change-in-production
      JWT_ACCESS_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 7d
      CORS_ORIGINS: http://localhost:3000,http://localhost:80
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: flowengine-web
    ports:
      - '3000:80'
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
